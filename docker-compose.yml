version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: siteforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: siteforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: siteforge-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
